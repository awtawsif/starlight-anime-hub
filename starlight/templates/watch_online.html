{% extends "base.html" %}

{% block title %}Watch {{ anime_title }} - Episode {{ episode_number }} | {{ config.WEBSITE_TITLE }}{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-6xl">
    <header class="mb-8">
        <a href="{{ url_for('main.episode_selection_page', anime_session_id=anime_session_id, anime_title=anime_title, page=1) }}" class="inline-flex items-center text-green-400 hover:text-green-300 transition-colors mb-4 group font-mono text-sm uppercase tracking-wider">
            <svg class="h-4 w-4 mr-2 transform group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Return to Episodes
        </a>
        <h1 class="text-3xl md:text-5xl font-extrabold text-white tracking-tight break-words">
            {{ anime_title }}
        </h1>
        <h2 class="text-xl md:text-2xl font-medium text-green-400 mt-2 font-mono break-words">
            Episode {{ episode_number }}
        </h2>
    </header>

    <main class="w-full flex flex-col items-center">
        <!-- Video Player Container -->
        <div id="videoContainer" class="w-full aspect-video bg-black border-2 border-green-500/50 shadow-[0_0_30px_rgba(34,197,94,0.15)] rounded-sm relative overflow-hidden group">
            <!-- Static Loading Overlay (Performance Optimized) -->
            <div id="loadingOverlay" class="absolute inset-0 bg-black flex flex-col items-center justify-center z-20 font-mono">
                <div class="text-green-500 text-lg uppercase tracking-widest font-bold">
                    [ Loading Stream ]
                </div>
            </div>
            
            <!-- ArtPlayer will be mounted here -->
            <div id="player" class="w-full h-full"></div>
        </div>
    </main>

    <footer class="mt-8 flex justify-between items-center border-t border-green-900/50 pt-6">
        <button class="px-4 py-2 bg-black border border-gray-700 text-gray-500 font-mono text-xs uppercase tracking-wider cursor-not-allowed" disabled>
            &lt; Prev
        </button>
        <div class="flex space-x-1">
            <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
            <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse" style="animation-delay: 200ms;"></span>
            <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse" style="animation-delay: 400ms;"></span>
        </div>
        <button class="px-4 py-2 bg-black border border-gray-700 text-gray-500 font-mono text-xs uppercase tracking-wider cursor-not-allowed" disabled>
            Next &gt;
        </button>
    </footer>
</div>

<style>
    @keyframes slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(300%); }
    }
</style>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.0"></script>
<script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/artplayer-plugin-hls-control/dist/artplayer-plugin-hls-control.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const anime_session_id = "{{ anime_session_id }}";
    const episode_session_id = "{{ episode_session_id }}";
    const loadingOverlay = document.getElementById('loadingOverlay');
    let art = null;

    fetch(`/api/episode-streams/${anime_session_id}/${episode_session_id}`)
        .then(response => response.json())
        .then(data => {
            if (data.streams && data.streams.length > 0) {
                loadingOverlay.style.display = 'none';
                
                // Sort streams descending by resolution
                data.streams.sort((a, b) => {
                    let resA = parseInt(a.resolution);
                    let resB = parseInt(b.resolution);
                    return (resB || 0) - (resA || 0);
                });

                // Pick the highest resolution stream as initial source
                const initialStream = data.streams[0].url;

                // Map streams to ArtPlayer quality format
                const qualityLevels = data.streams.map((stream, index) => {
                    const audioLabel = stream.audio ? `[${stream.audio.toUpperCase()}]` : '';
                    return {
                        default: index === 0,
                        html: `${audioLabel} ${stream.resolution}p ${stream.fansub || ''}`.trim(),
                        url: stream.url
                    };
                });

                art = new Artplayer({
                    container: '#player',
                    url: initialStream,
                    type: 'hls',
                    theme: '#22c55e', // Green theme matching the site
                    autoplay: false,
                    pip: true,
                    screenshot: true,
                    setting: true,
                    loop: false,
                    flip: true,
                    playbackRate: true,
                    aspectRatio: true,
                    fullscreen: true,
                    miniProgressBar: true,
                    mutex: true,
                    backdrop: true,
                    playsInline: true,
                    autoPlayback: true,
                    airplay: true,
                    quality: qualityLevels,
                    customType: {
                        hls: function(video, url, art) {
                            if (Hls.isSupported()) {
                                if (art.hls) art.hls.destroy();
                                const hls = new Hls();
                                hls.loadSource(url);
                                hls.attachMedia(video);
                                art.hls = hls;
                                art.on('destroy', () => hls.destroy());
                                
                                // Preserve playback position when switching quality
                                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                                    if (art.currentTime > 0) {
                                        video.currentTime = art.currentTime;
                                    }
                                });
                            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                                video.src = url;
                            }
                        },
                    },
                    settings: [
                        {
                            html: 'Playback Speed',
                            selector: [
                                { html: '0.5x', value: 0.5 },
                                { html: '0.75x', value: 0.75 },
                                { html: 'Normal', value: 1, default: true },
                                { html: '1.25x', value: 1.25 },
                                { html: '1.5x', value: 1.5 },
                                { html: '2.0x', value: 2 },
                            ],
                            onSelect: function(item) {
                                art.playbackRate = item.value;
                                return item.html;
                            },
                        },
                    ],
                });

                // Set local custom styles for the player to match our vibe
                art.on('ready', () => {
                    const playerElement = document.querySelector('.artplayer-app');
                    if (playerElement) {
                        playerElement.style.fontFamily = 'monospace';
                    }
                });

            } else {
                loadingOverlay.innerHTML = '<div class="text-red-400 font-mono text-center">Failed to load stream.<br>Media unavailable.</div>';
                loadingOverlay.style.display = 'flex';
            }
        })
        .catch(err => {
            console.error('Error fetching stream:', err);
            loadingOverlay.innerHTML = '<div class="text-red-400 font-mono text-center">Connection Error.<br>Please try again later.</div>';
            loadingOverlay.style.display = 'flex';
        });
});
</script>
{% endblock %}
